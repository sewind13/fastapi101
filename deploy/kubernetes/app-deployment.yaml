apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-template-app
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: fastapi-template-app
  template:
    metadata:
      labels:
        app: fastapi-template-app
    spec:
      containers:
        - name: app
          image: ghcr.io/your-org/fastapi-template:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - ./scripts/start-web.sh
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: fastapi-template-app-secrets
            - configMapRef:
                name: fastapi-template-app-config
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-template-app
spec:
  selector:
    app: fastapi-template-app
  ports:
    - name: http
      port: 80
      targetPort: http
