apiVersion: batch/v1
kind: CronJob
metadata:
  name: fastapi-template-cleanup-revoked-tokens
spec:
  schedule: "17 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: cleanup-revoked-tokens
              image: ghcr.io/your-org/fastapi-template:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - ./scripts/run-cleanup-revoked-tokens.sh
              envFrom:
                - secretRef:
                    name: fastapi-template-app-secrets
                - configMapRef:
                    name: fastapi-template-app-config
