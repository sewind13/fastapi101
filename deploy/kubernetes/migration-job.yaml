apiVersion: batch/v1
kind: Job
metadata:
  name: fastapi-template-migrate
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/your-org/fastapi-template:1.0.4
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - alembic upgrade head
          envFrom:
            - secretRef:
                name: fastapi-template-app-secrets
            - configMapRef:
                name: fastapi-template-app-config
