global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: fastapi-template
    metrics_path: /metrics
    # If METRICS__AUTH_TOKEN is enabled, configure Prometheus authorization here.
    # authorization:
    #   credentials: replace-me-with-metrics-token
    static_configs:
      - targets:
          - web:8000
