global:
  resolve_timeout: 5m

route:
  receiver: default-webhook
  group_by:
    - alertname
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: critical-webhook

receivers:
  - name: default-webhook
    webhook_configs:
      - url: http://host.docker.internal:5001/alerts
        send_resolved: true

  - name: critical-webhook
    webhook_configs:
      - url: http://host.docker.internal:5001/critical-alerts
        send_resolved: true

  - name: slack-example
    slack_configs:
      - api_url: https://hooks.slack.com/services/CHANGE/ME
        channel: "#alerts"
        send_resolved: true
        title: "{{ .CommonAnnotations.summary }}"
        text: "{{ .CommonAnnotations.description }}"

  - name: email-example
    email_configs:
      - to: ops@example.com
        from: alerts@example.com
        smarthost: smtp.example.com:587
        auth_username: alerts@example.com
        auth_password: change-me
        require_tls: true

inhibit_rules: []
