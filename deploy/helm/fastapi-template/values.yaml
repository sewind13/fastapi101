nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/your-org/fastapi-template
  tag: "1.0.4"
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

hpa:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

api:
  enabled: true
  command:
    - /bin/sh
    - -c
    - ./scripts/start-web.sh
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

worker:
  enabled: false
  replicaCount: 1
  command:
    - /bin/sh
    - -c
    - ./scripts/start-worker.sh
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

outboxDispatcher:
  enabled: false
  replicaCount: 1
  command:
    - /bin/sh
    - -c
    - ./scripts/start-outbox-dispatcher.sh
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

migrationJob:
  enabled: true
  backoffLimit: 1
  command:
    - /bin/sh
    - -c
    - alembic upgrade head

config:
  APP__ENV: "production"
  APP__NAME: "FastAPI Product Template"
  APP__DEBUG: "false"
  APP__PUBLIC_BASE_URL: "https://api.example.com"
  API__V1_PREFIX: "/api/v1"
  API__CORS_ORIGINS: '["https://app.example.com"]'
  API__PUBLIC_REGISTRATION_ENABLED: "false"
  EXAMPLES__ENABLE_ITEMS_MODULE: "false"
  DATABASE__POOL_SIZE: "10"
  DATABASE__MAX_OVERFLOW: "20"
  SECURITY__ISSUER: "https://api.example.com"
  SECURITY__AUDIENCE: "fastapi-product-template"
  AUTH_RATE_LIMIT__ENABLED: "false"
  AUTH_RATE_LIMIT__BACKEND: "memory"
  AUTH_RATE_LIMIT__TRUST_PROXY_HEADERS: "true"
  AUTH_RATE_LIMIT__TRUSTED_PROXY_CIDRS: '["10.0.0.0/8"]'
  LOGGING__LEVEL: "INFO"
  METRICS__ENABLED: "false"
  METRICS__PATH: "/metrics"
  TELEMETRY__ENABLED: "false"
  CACHE__ENABLED: "false"
  CACHE__BACKEND: "memory"
  OPS__ENABLED: "false"
  WORKER__ENABLED: "false"
  WORKER__QUEUE_NAME: "app.default"
  WORKER__RETRY_QUEUE_NAME: "app.default.retry"
  WORKER__DEAD_LETTER_QUEUE_NAME: "app.default.dlq"
  WORKER__PREFETCH_COUNT: "10"
  WORKER__MAX_RETRIES: "3"
  WORKER__RETRY_DELAY_MS: "30000"
  WORKER__MAX_RETRY_DELAY_MS: "300000"
  WORKER__REQUEUE_ON_FAILURE: "false"
  WORKER__IDEMPOTENCY_ENABLED: "true"
  WORKER__IDEMPOTENCY_BACKEND: "memory"
  WORKER__IDEMPOTENCY_KEY_PREFIX: "worker_idempotency"
  WORKER__IDEMPOTENCY_TTL_SECONDS: "86400"
  HEALTH__ENABLE_REDIS_CHECK: "false"
  HEALTH__ENABLE_QUEUE_CHECK: "false"

secretData:
  SECURITY__SECRET_KEY: "replace-with-a-long-random-secret"
  DATABASE__URL: "postgresql+psycopg://app:replace-me@postgres.example.internal:5432/app"
