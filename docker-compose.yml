# Local-only production-like compose baseline.
# Do not reuse these defaults as production deployment credentials.
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${LOCAL_POSTGRES_DB:-app}
      POSTGRES_USER: ${LOCAL_POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${LOCAL_POSTGRES_PASSWORD:-app}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  queue:
    image: rabbitmq:4-management-alpine
    profiles: ["worker"]
    environment:
      RABBITMQ_DEFAULT_USER: ${LOCAL_RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${LOCAL_RABBITMQ_PASSWORD:-guest}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  web:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE__URL: postgresql+psycopg://${LOCAL_POSTGRES_USER:-app}:${LOCAL_POSTGRES_PASSWORD:-app}@db:5432/${LOCAL_POSTGRES_DB:-app}
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    command: ["./scripts/start-web.sh"]

  worker:
    build:
      context: .
    profiles: ["worker"]
    depends_on:
      db:
        condition: service_healthy
      queue:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE__URL: postgresql+psycopg://${LOCAL_POSTGRES_USER:-app}:${LOCAL_POSTGRES_PASSWORD:-app}@db:5432/${LOCAL_POSTGRES_DB:-app}
      WORKER__ENABLED: "true"
      WORKER__BROKER_URL: amqp://${LOCAL_RABBITMQ_USER:-guest}:${LOCAL_RABBITMQ_PASSWORD:-guest}@queue:5672/
      HEALTH__QUEUE_URL: amqp://${LOCAL_RABBITMQ_USER:-guest}:${LOCAL_RABBITMQ_PASSWORD:-guest}@queue:5672/
    command: ["./scripts/start-worker.sh"]

  outbox-dispatcher:
    build:
      context: .
    profiles: ["worker"]
    depends_on:
      db:
        condition: service_healthy
      queue:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE__URL: postgresql+psycopg://${LOCAL_POSTGRES_USER:-app}:${LOCAL_POSTGRES_PASSWORD:-app}@db:5432/${LOCAL_POSTGRES_DB:-app}
      WORKER__ENABLED: "true"
      WORKER__BROKER_URL: amqp://${LOCAL_RABBITMQ_USER:-guest}:${LOCAL_RABBITMQ_PASSWORD:-guest}@queue:5672/
    command: ["./scripts/start-outbox-dispatcher.sh"]

volumes:
  postgres_data:
