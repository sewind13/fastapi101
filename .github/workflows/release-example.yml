name: Release Example

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to build and deploy
        required: true
        default: latest
      release_name:
        description: Helm release name
        required: true
        default: fastapi-template
      namespace:
        description: Kubernetes namespace
        required: true
        default: default

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image reference
        id: meta
        run: echo "image_ref=ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.image_ref }}

  migrate:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Load kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "Missing KUBE_CONFIG secret."
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"

      - name: Lint Helm chart
        run: helm lint deploy/helm/fastapi-template

      - name: Run migration job
        run: |
          kubectl delete job ${{ inputs.release_name }}-migrate --namespace ${{ inputs.namespace }} --ignore-not-found
          helm template ${{ inputs.release_name }} deploy/helm/fastapi-template \
            --namespace ${{ inputs.namespace }} \
            --values deploy/helm/fastapi-template/values.prod.example.yaml \
            --set image.repository=ghcr.io/${{ github.repository }} \
            --set image.tag=${{ inputs.image_tag }} \
            --show-only templates/migration-job.yaml | kubectl apply -n ${{ inputs.namespace }} -f -
          kubectl wait --namespace ${{ inputs.namespace }} --for=condition=complete job/${{ inputs.release_name }}-migrate --timeout=300s

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - migrate
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Load kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "Missing KUBE_CONFIG secret."
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"

      - name: Lint Helm chart
        run: helm lint deploy/helm/fastapi-template

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ inputs.release_name }} deploy/helm/fastapi-template \
            --namespace ${{ inputs.namespace }} \
            --create-namespace \
            --values deploy/helm/fastapi-template/values.prod.example.yaml \
            --set image.repository=ghcr.io/${{ github.repository }} \
            --set image.tag=${{ inputs.image_tag }} \
            --set migrationJob.enabled=false

      - name: Wait for API rollout
        run: |
          kubectl rollout status deployment/${{ inputs.release_name }}-api --namespace ${{ inputs.namespace }} --timeout=300s

      - name: Wait for worker rollout
        run: |
          kubectl rollout status deployment/${{ inputs.release_name }}-worker --namespace ${{ inputs.namespace }} --timeout=300s || true

      - name: Wait for outbox dispatcher rollout
        run: |
          kubectl rollout status deployment/${{ inputs.release_name }}-outbox-dispatcher --namespace ${{ inputs.namespace }} --timeout=300s || true
