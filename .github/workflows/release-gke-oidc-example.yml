name: Release To GKE With OIDC Example

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to build and deploy
        required: true
        default: latest
      release_name:
        description: Helm release name
        required: true
        default: fastapi-template
      namespace:
        description: Kubernetes namespace
        required: true
        default: default

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
  GKE_CLUSTER_LOCATION: ${{ vars.GKE_CLUSTER_LOCATION }}
  GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ inputs.image_tag }}

  migrate:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud with OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_CLUSTER_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/fastapi-template

      - name: Run migration job from Helm chart
        run: |
          kubectl delete job ${{ inputs.release_name }}-migrate --namespace ${{ inputs.namespace }} --ignore-not-found
          helm template ${{ inputs.release_name }} deploy/helm/fastapi-template \
            --namespace ${{ inputs.namespace }} \
            --values deploy/helm/fastapi-template/values.prod.example.yaml \
            --set image.repository=ghcr.io/${{ github.repository }} \
            --set image.tag=${{ inputs.image_tag }} \
            --show-only templates/migration-job.yaml | kubectl apply -n ${{ inputs.namespace }} -f -
          kubectl wait --namespace ${{ inputs.namespace }} --for=condition=complete job/${{ inputs.release_name }}-migrate --timeout=300s

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build
      - migrate
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud with OIDC
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Fetch GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_CLUSTER_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/fastapi-template

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ inputs.release_name }} deploy/helm/fastapi-template \
            --namespace ${{ inputs.namespace }} \
            --create-namespace \
            --values deploy/helm/fastapi-template/values.prod.example.yaml \
            --set image.repository=ghcr.io/${{ github.repository }} \
            --set image.tag=${{ inputs.image_tag }} \
            --set migrationJob.enabled=false

      - name: Wait for API rollout
        run: kubectl rollout status deployment/${{ inputs.release_name }}-api --namespace ${{ inputs.namespace }} --timeout=300s

      - name: Wait for worker rollout
        run: kubectl rollout status deployment/${{ inputs.release_name }}-worker --namespace ${{ inputs.namespace }} --timeout=300s || true

      - name: Wait for outbox dispatcher rollout
        run: kubectl rollout status deployment/${{ inputs.release_name }}-outbox-dispatcher --namespace ${{ inputs.namespace }} --timeout=300s || true
