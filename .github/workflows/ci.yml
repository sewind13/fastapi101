name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  workflow_validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate GitHub Actions workflows
        uses: rhysd/actionlint@v1

  helm_validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/fastapi-template

      - name: Set up kubeconform
        uses: yokawasa/action-setup-kube-tools@v0.11.2
        with:
          kubeconform: "0.6.7"

      - name: Render default chart
        run: helm template fastapi-template deploy/helm/fastapi-template > /tmp/helm-default.yaml

      - name: Render production example values
        run: helm template fastapi-template deploy/helm/fastapi-template -f deploy/helm/fastapi-template/values.prod.example.yaml > /tmp/helm-prod.yaml

      - name: Validate rendered manifests with kubeconform
        run: |
          kubeconform -strict -summary /tmp/helm-default.yaml
          kubeconform -strict -summary /tmp/helm-prod.yaml

  quality:
    runs-on: ubuntu-latest
    needs:
      - workflow_validation
      - helm_validation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy app tests

      - name: Run Alembic upgrade
        env:
          DATABASE__URL: sqlite:///./ci.db
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest -q
