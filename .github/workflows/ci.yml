name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  workflow_validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate GitHub Actions workflows
        uses: rhysd/actionlint@v1

  helm_validation:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint deploy/helm/fastapi-template

      - name: Set up kubeconform
        uses: yokawasa/action-setup-kube-tools@v0.11.2
        with:
          kubeconform: "0.6.7"

      - name: Render default chart
        run: helm template fastapi-template deploy/helm/fastapi-template > /tmp/helm-default.yaml

      - name: Render production example values
        run: helm template fastapi-template deploy/helm/fastapi-template -f deploy/helm/fastapi-template/values.prod.example.yaml > /tmp/helm-prod.yaml

      - name: Validate rendered manifests with kubeconform
        run: |
          kubeconform -strict -summary /tmp/helm-default.yaml
          kubeconform -strict -summary /tmp/helm-prod.yaml

  quality:
    runs-on: ubuntu-latest
    needs:
      - workflow_validation
      - helm_validation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --all-groups --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Typecheck
        run: uv run mypy app tests

      - name: Run Alembic upgrade
        env:
          DATABASE__URL: sqlite:///./ci.db
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest -q

  security_validation:
    runs-on: ubuntu-latest
    needs:
      - workflow_validation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Export runtime dependency inventory
        run: >
          uv export --frozen --all-extras --no-dev --no-hashes
          --format requirements-txt --output-file /tmp/runtime-requirements.txt
          > /dev/null

      - name: Audit Python runtime dependencies
        run: uvx pip-audit --no-deps --disable-pip -r /tmp/runtime-requirements.txt

      - name: Scan repository for committed secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  postgres_integration:
    runs-on: ubuntu-latest
    needs:
      - quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d app_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync --frozen --all-groups --all-extras

      - name: Run Postgres-backed integration tests
        env:
          TEST_DATABASE_URL: postgresql+psycopg://app:app@localhost:5432/app_test
        run: uv run pytest tests/integration/postgres -q

  docker_build:
    runs-on: ubuntu-latest
    needs:
      - quality
      - security_validation
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build core production image
        run: docker build --tag fastapi-template:ci .

      - name: Build full production image
        run: docker build --build-arg RUNTIME_EXTRAS=all --tag fastapi-template:ci-all .

      - name: Scan full production image
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: fastapi-template:ci-all
          format: table
          exit-code: "0"
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Generate full production image SBOM
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: fastapi-template:ci-all
          format: cyclonedx
          output: trivy-sbom.cdx.json
          exit-code: "0"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastapi-template-ci-all-sbom
          path: trivy-sbom.cdx.json
